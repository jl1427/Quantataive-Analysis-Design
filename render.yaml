services:
  - type: web
    name: noobtrade
    env: docker
    plan: starter
    autoDeploy: true
    domains:
      - noobtrade.com
      - www.noobtrade.com
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MARKET_DATA_TOKEN
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://noobtrade.com,https://www.noobtrade.com"
